<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}TimeTracking{% endblock %} – Cooperativa Oltre i Sogni</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    :root { --bs-primary: #1565C0; }
    .navbar { background-color: #1565C0 !important; }
    .navbar-brand, .nav-link { color: #fff !important; }
    .nav-link:hover { color: #bbdefb !important; }
    .nav-link.active { font-weight: 700; color: #fff !important; }
    .sidebar { min-height: calc(100vh - 56px); background: #f8f9fa; border-right: 1px solid #dee2e6; }
    .table-header { background-color: #0D3C7A; color: white; }
    .badge-api { font-family: monospace; font-size: .75rem; background: #e3f2fd; color: #1565C0; }
    .card-header-blue { background-color: #1565C0; color: white; }
    .totale-row { background-color: #FFF9C4; font-weight: bold; }
    .complessivo-row { background-color: #C8E6C9; font-weight: bold; }
    .weekend { background-color: #fff3e0 !important; }
    .today { background-color: #e3f2fd !important; }
    .ore-cell { font-weight: 600; }
    .ferie-val { color: #E65100; }
    .malattia-val { color: #B71C1C; }
    .legge104-val { color: #4A148C; }
  </style>
</head>
<body>

{% if current_user %}
<nav class="navbar navbar-expand-lg">
  <div class="container-fluid">
    <a class="navbar-brand fw-bold" href="/dashboard">
      <i class="bi bi-clock-history me-2"></i>TimeTracking
    </a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="nav">
      <ul class="navbar-nav me-auto">
        <li class="nav-item">
          <a class="nav-link {% if request.url.path == '/dashboard' %}active{% endif %}" href="/dashboard">
            <i class="bi bi-speedometer2 me-1"></i>Dashboard
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if '/operators' in request.url.path %}active{% endif %}" href="/operators">
            <i class="bi bi-people me-1"></i>Operatori
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if request.url.path == '/settings' %}active{% endif %}" href="/settings">
            <i class="bi bi-gear me-1"></i>Impostazioni
          </a>
        </li>
      </ul>
      <ul class="navbar-nav">
        <li class="nav-item">
          <a class="nav-link" href="/logout"><i class="bi bi-box-arrow-right me-1"></i>Esci</a>
        </li>
      </ul>
    </div>
  </div>
</nav>
{% endif %}

<div class="container-fluid py-4">
  {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
