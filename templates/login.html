<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login – TimeTracking</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body { background: linear-gradient(135deg, #1565C0 0%, #0D3C7A 100%); min-height: 100vh; }
  </style>
</head>
<body class="d-flex align-items-center justify-content-center">
  <div class="card shadow-lg" style="width: 380px;">
    <div class="card-body p-4">
      <div class="text-center mb-4">
        <i class="bi bi-clock-history text-primary" style="font-size: 3rem;"></i>
        <h4 class="mt-2 fw-bold">TimeTracking</h4>
        <p class="text-muted small">Cooperativa Sociale Oltre i Sogni</p>
      </div>

      {% if error %}
      <div class="alert alert-danger py-2 small">
        <i class="bi bi-exclamation-triangle me-1"></i>{{ error }}
      </div>
      {% endif %}

      <form method="post" action="/login">
        <div class="mb-3">
          <label class="form-label fw-semibold">Username</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-person"></i></span>
            <input type="text" name="username" class="form-control" placeholder="admin" required autofocus>
          </div>
        </div>
        <div class="mb-4">
          <label class="form-label fw-semibold">Password</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-lock"></i></span>
            <input type="password" name="password" class="form-control" required>
          </div>
        </div>
        <button type="submit" class="btn btn-primary w-100 fw-semibold">
          <i class="bi bi-box-arrow-in-right me-2"></i>Accedi
        </button>
      </form>
    </div>
  </div>
</body>
</html>
